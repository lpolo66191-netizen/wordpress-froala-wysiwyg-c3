name: Sync Version – WordPress

on:
  repository_dispatch:
    types: [version_update]

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT }}
          fetch-depth: 0

      - name: Load & validate version
        run: |
          VERSION="${{ github.event.client_payload.version }}"
          VERSION="${VERSION//,/\.}"

          if [ -z "$VERSION" ]; then
            echo "Version missing in dispatch payload"
            exit 1
          fi

          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid version format: $VERSION"
            exit 1
          fi

          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Dispatching version $VERSION"

      - name: Compare current version
        run: |
          CURRENT_VERSION=$(grep -RhoE '[0-9]+\.[0-9]+\.[0-9]+' public admin | head -n 1)

          if [ -z "$CURRENT_VERSION" ]; then
            echo "Unable to determine current version from repository"
            exit 1
          fi

          echo "Current version : $CURRENT_VERSION"
          echo "Incoming version: $VERSION"

          if [ "$CURRENT_VERSION" = "$VERSION" ]; then
            echo "Versions are identical. Denying PR creation."
            exit 0
          fi

          echo "Version change detected. Proceeding."


      - name: Prepare release branch
        run: |
          BRANCH="release-v${VERSION}"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

          git fetch origin

          if git ls-remote --heads origin "$BRANCH" | grep -q "$BRANCH"; then
            git checkout "$BRANCH"
            git pull origin "$BRANCH"
          else
            git checkout -b "$BRANCH"
          fi


      - name: Sync assets from primary repo
        env:
          GIT_TOKEN: ${{ secrets.PAT }}
        run: |
          git clone --depth 1 \
            "https://x-access-token:${GIT_TOKEN}@github.com/froala/wysiwyg-editor.git" \
            /tmp/wysiwyg-main

          rsync -av --delete /tmp/wysiwyg-main/js/ public/js/
          rsync -av --delete /tmp/wysiwyg-main/css/ public/css/
          rsync -av --delete /tmp/wysiwyg-main/js/ admin/js/
          rsync -av --delete /tmp/wysiwyg-main/css/ admin/css/


      - name: Commit & push
        run: |
          git config user.name "froala-travis-bot"
          git config user.email "froala_git_travis_bot@idera.com"

          git add public admin
          git commit -m "chore: release WordPress plugin v${VERSION}" || echo "Nothing to commit"
          git push origin "$BRANCH"


      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.PAT }}
          RELEASE_NOTES: ${{ github.event.client_payload.release_notes }}
        run: |
          git fetch origin master

          if git diff --quiet origin/master..."$BRANCH"; then
            echo "No commits between $BRANCH and master. Skipping PR creation."
            exit 0
          fi

          PR_BODY=$(printf \
            "release: yes\n\n## Release Notes (from primary repo)\n\n%s\n" \
            "$RELEASE_NOTES")

          gh pr create \
            --base master \
            --head "$BRANCH" \
            --title "Release v${VERSION}" \
            --body "$PR_BODY" \
            || echo "Pull request already exists"
